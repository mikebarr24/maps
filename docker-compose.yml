services:
  postgres:
    image: postgres:15.17-trixie
    container_name: maps-postgres
    environment:
      POSTGRES_DB: maps
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d maps"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"
    volumes:
      - maps-postgres-data:/var/lib/postgresql/data

volumes:
  maps-postgres-data:
